name: 'OpenFGA Model Testing Action'
description: 'Github Action for testing your OpenFGA Authorization Model'
branding:
  icon: 'align-center'
  color: 'green'

inputs:
  test_path:
    description: 'Path to the test file or folder'
    required: false
    default: '.'
  test_files_pattern:
    description: 'Pattern to match the test files'
    required: false
    default: '*.fga.yaml'
  fga_server_url:
    description: 'The OpenFGA server to test the Authorization Model against. If not provided, the tests will be run using the cli built-in OpenFGA instance.'
    required: false
    default: ''
  fga_server_store_id:
    description: 'The OpenFGA server store id. Must be provided if fga_server_url is configured.'
    required: false
    default: ''
  fga_api_token:
    description: 'The api token to use for testing against an OpenFGA server. Ignored if fga_server_url is not provided.'
    required: false
    default: ''
  fga_cli_version:
    description: 'Version tag of openfga/cli to use'
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Validate Subscription
      shell: bash
      env:
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        UPSTREAM="openfga/action-openfga-test"
        ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
        DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

        echo ""
        echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
        echo "Secure drop-in replacement for $UPSTREAM"
        if [ "$REPO_PRIVATE" = "false" ]; then
          echo -e "\033[32m✓ Free for public repositories\033[0m"
        fi
        echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
        echo ""

        if [ "$REPO_PRIVATE" != "false" ]; then
          SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

          if [ "$SERVER_URL" != "https://github.com" ]; then
            BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
          else
            BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
          fi

          API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

          RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Timeout or API not reachable. Continuing to next step."
          elif [ "$RESPONSE" = "403" ]; then
            echo "::error::This action requires a StepSecurity subscription for private repositories."
            echo "::error::Learn how to enable a subscription: $DOCS_URL"
            exit 1
          fi
        fi
    - name: Resolve CLI version and checksum
      id: resolve-cli
      shell: bash
      env:
        INPUT_FGA_CLI_VERSION: ${{ inputs.fga_cli_version }}
      run: |
        if [ "$INPUT_FGA_CLI_VERSION" == "latest" ]; then
          VERSION=$(curl -s https://api.github.com/repos/openfga/cli/releases/latest | jq -r '.tag_name')
        else
          VERSION="$INPUT_FGA_CLI_VERSION"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

        curl -sL "https://github.com/openfga/cli/releases/download/${VERSION}/checksums.txt" -o checksums.txt

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          i386|i686) ARCH="386" ;;
        esac

        VERSION_NUM="${VERSION#v}"
        ARCHIVE="fga_${VERSION_NUM}_${OS}_${ARCH}.tar.gz"
        CHECKSUM=$(grep "  ${ARCHIVE}$" checksums.txt | awk '{print $1}')

        if [ -z "$CHECKSUM" ]; then
          echo "::error::Could not find checksum for ${ARCHIVE}"
          exit 1
        fi

        echo "digest=${CHECKSUM}" >> "$GITHUB_OUTPUT"
    - name: Install OpenFGA CLI
      uses: step-security/action-install-gh-release@v2
      with:
        repo: openfga/cli
        tag: ${{ steps.resolve-cli.outputs.version }}
        digest: ${{ steps.resolve-cli.outputs.digest }}
        cache: enable
    - uses: step-security/setup-yq@v1
      with:
        yq-version: v4.25.3
    - name: Run OpenFGA CLI
      shell: bash
      env:
        INPUT_TEST_PATH: ${{ inputs.test_path }}
        INPUT_TEST_FILES_PATTERN: ${{ inputs.test_files_pattern }}
        INPUT_FGA_SERVER_URL: ${{ inputs.fga_server_url }}
        INPUT_FGA_SERVER_STORE_ID: ${{ inputs.fga_server_store_id }}
        INPUT_FGA_API_TOKEN: ${{ inputs.fga_api_token }}
      run: |
        if [ -n "$INPUT_FGA_API_TOKEN" ]; then
          echo "::add-mask::$INPUT_FGA_API_TOKEN"
        fi

        while IFS= read -r -d '' test_file
        do
          ((test_files_count+=1))

          if [[ -z "$INPUT_FGA_SERVER_URL" ]]; then
            echo "Running FGA test file ${test_file}"
            fga model test --tests "${test_file}"
          else
            echo "Running FGA test file ${test_file} against OpenFGA server $INPUT_FGA_SERVER_URL"
            test_file_without_model=$(mktemp)
            yq 'del(.model_file, .model)' "${test_file}" > "${test_file_without_model}"
            fga model test \
              --api-url "$INPUT_FGA_SERVER_URL" \
              --store-id "$INPUT_FGA_SERVER_STORE_ID" \
              ${INPUT_FGA_API_TOKEN:+--api-token "$INPUT_FGA_API_TOKEN"} \
              --tests "${test_file_without_model}"
          fi

        done <   <(find "$INPUT_TEST_PATH" -name "$INPUT_TEST_FILES_PATTERN" -print0)

        if [[ ${test_files_count} -eq 0 ]]; then
          echo "No FGA test file found for path '$INPUT_TEST_PATH' and pattern '$INPUT_TEST_FILES_PATTERN'"
          exit 1
        fi